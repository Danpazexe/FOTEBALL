name: CI

# Checagens rápidas a cada push/PR na main: typecheck, lint e testes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas da mesma branch/PR quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Testes (jest)
        run: npm test -- --ci
