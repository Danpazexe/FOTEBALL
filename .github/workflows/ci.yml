name: CI

# Checagens de qualidade a cada push/PR na main: typecheck, lint e testes.
# Cada checagem roda como um job próprio (status individual = erro rastreável),
# com annotations inline no código e um gate final que resume tudo.
#
# Segurança: actions de terceiros pinadas por SHA de commit completo (a tag no
# comentário é só referência humana) e checkout sem credenciais persistidas —
# nenhum passo deste workflow faz push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela execuções antigas da mesma branch/PR quando chega um push novo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Princípio do menor privilégio (permissões extras só por job, quando precisa).
permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    # 20 min (antes 15): jest com --coverage instrumenta o código e fica mais lento.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: Typecheck
            script: typecheck
            args: --pretty false
            matcher: tsc
          - task: Lint
            script: lint
            args: --format stylish
            matcher: eslint-stylish
          - task: Testes
            script: test
            args: >-
              --ci --coverage
              --coverageReporters=text-summary
              --coverageReporters=json-summary
              --reporters=default
              --reporters=github-actions
            matcher: ""
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Nenhum passo faz push — não deixar o token gravado no .git/config.
          persist-credentials: false

      - name: ⚙️ Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧭 Ambiente (versões)
        run: |
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"

      - name: 📦 Instalar dependências (npm ci)
        run: npm ci

      - name: 🧩 Registrar problem matcher (${{ matrix.matcher }})
        if: matrix.matcher != ''
        run: echo "::add-matcher::.github/matchers/${{ matrix.matcher }}.json"

      # O tee preserva o stdout (problem matchers continuam lendo o log ao vivo)
      # e grava uma cópia para o Resumo extrair contagens depois. O pipefail
      # garante que a falha do npm não seja mascarada pelo tee.
      - name: ${{ matrix.task }}
        run: |
          set -euo pipefail
          npm run ${{ matrix.script }} -- ${{ matrix.args }} 2>&1 \
            | tee "$RUNNER_TEMP/saida-${{ matrix.script }}.log"

      - name: 📋 Resumo (${{ matrix.task }})
        if: always()
        env:
          TAREFA: ${{ matrix.task }}
          LOG: ${{ runner.temp }}/saida-${{ matrix.script }}.log
          STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "$STATUS" = "success" ]; then ICONE="✅"; else ICONE="❌"; fi
          {
            echo "### $ICONE $TAREFA — \`$STATUS\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          case "$TAREFA" in
            Testes)
              # Estatísticas do jest (linhas finais do reporter default).
              if [ -f "$LOG" ]; then
                SUITES=$(grep -E '^Test Suites:' "$LOG" | tail -n 1 | sed -E 's/^Test Suites:[[:space:]]*//' || true)
                TESTES=$(grep -E '^Tests:' "$LOG" | tail -n 1 | sed -E 's/^Tests:[[:space:]]*//' || true)
                TEMPO=$(grep -E '^Time:' "$LOG" | tail -n 1 | sed -E 's/^Time:[[:space:]]*//' || true)
                {
                  echo "| Métrica | Valor |"
                  echo "|---|---|"
                  echo "| Suítes | ${SUITES:-n/d} |"
                  echo "| Testes | ${TESTES:-n/d} |"
                  echo "| Tempo | ${TEMPO:-n/d} |"
                  echo ""
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              # Cobertura (json-summary do istanbul, sem dependência nova).
              if [ -f coverage/coverage-summary.json ]; then
                {
                  echo "#### 📊 Cobertura"
                  echo ""
                  echo "| Tipo | % | Cobertos/Total |"
                  echo "|---|---|---|"
                  node -e '
                    const t = require("./coverage/coverage-summary.json").total;
                    const linhas = [
                      ["statements", "Statements"],
                      ["branches", "Branches"],
                      ["functions", "Functions"],
                      ["lines", "Lines"],
                    ];
                    for (const [chave, rotulo] of linhas) {
                      const v = t[chave];
                      console.log("| " + rotulo + " | " + v.pct + "% | " + v.covered + "/" + v.total + " |");
                    }
                  '
                  echo ""
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            Typecheck)
              if [ "$STATUS" != "success" ] && [ -f "$LOG" ]; then
                ERROS=$(grep -c 'error TS' "$LOG" || true)
                echo "Erros de tipo: **${ERROS:-0}**" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            Lint)
              if [ "$STATUS" != "success" ] && [ -f "$LOG" ]; then
                # Linha-resumo do formato stylish: "✖ N problems (X errors, Y warnings)".
                ERROS=$(grep -Eo '[0-9]+ errors?' "$LOG" | tail -n 1 | grep -Eo '^[0-9]+' || true)
                AVISOS=$(grep -Eo '[0-9]+ warnings?' "$LOG" | tail -n 1 | grep -Eo '^[0-9]+' || true)
                echo "Erros de lint: **${ERROS:-n/d}** · Avisos: **${AVISOS:-0}**" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
          esac

      - name: 📤 Publicar cobertura (artifact)
        if: always() && matrix.task == 'Testes'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # Gate único: serve como status check obrigatório (resume os 3 jobs acima).
  ci-status:
    name: CI status
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read # listar os jobs desta run para a tabela consolidada
    steps:
      - name: 📋 Resumo consolidado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULTADO: ${{ needs.quality.result }}
        run: |
          set -euo pipefail
          {
            echo "## 🧪 CI — resumo consolidado"
            echo ""
            echo "| Checagem | Resultado |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          # Tabela por job via API; se a chamada falhar, cai no resultado agregado.
          if JOBS=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" \
              --jq '.jobs[] | select(.status == "completed") | [.name, .conclusion] | @tsv' 2>/dev/null); then
            while IFS=$'\t' read -r NOME CONCLUSAO; do
              [ -z "$NOME" ] && continue
              case "$CONCLUSAO" in
                success)   ICONE="✅" ;;
                failure)   ICONE="❌" ;;
                cancelled) ICONE="🚫" ;;
                skipped)   ICONE="⏭️" ;;
                *)         ICONE="ℹ️" ;;
              esac
              echo "| $NOME | $ICONE \`$CONCLUSAO\` |" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$JOBS"
          else
            echo "| Typecheck · Lint · Testes | \`$RESULTADO\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Avaliar resultado
        run: |
          echo "Resultado das checagens: ${{ needs.quality.result }}"
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "::error::Uma ou mais checagens falharam (veja os jobs acima)."
            exit 1
          fi
          echo "Todas as checagens passaram. ✅"
