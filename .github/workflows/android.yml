name: Android APK

# Builda um APK debug (instalável, assinado com a debug key — sem segredos).
# Dispara: manualmente (botão "Run workflow" na aba Actions) OU ao criar uma
# tag de versão (ex.: `git tag v0.1.0 && git push origin v0.1.0`).
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-apk:
    name: Build APK debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build do APK debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Subir o APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: foteball-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
