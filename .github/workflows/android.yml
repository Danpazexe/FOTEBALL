name: Android APK

# Builda um APK instalável e o publica.
#   • Push na main → APK de teste (release) publicado no Release "nightly":
#     github.com/Danpazexe/FOTEBALL/releases/tag/nightly (baixe direto no celular).
#     Release empacota o JS no APK, então roda offline sem precisar do Metro.
#   • Disparo manual: Actions → "Android APK" → Run workflow (escolha debug/release;
#     debug NÃO empacota o JS — só serve pra rodar ligado no Metro em dev).
#   • Por tag de versão: `git tag v0.1.0 && git push origin v0.1.0` (sempre release).
#
# Assinatura: debug e release usam a debug key do projeto (android/app/debug.keystore),
# então NÃO é preciso configurar segredos. Para distribuir de verdade, troque por uma
# release keystore guardada como secret (ver README).
#
# Segurança: actions de terceiros pinadas por SHA de commit completo (a tag no
# comentário é só referência humana), checkout sem credenciais persistidas e
# permissões declaradas no nível do job.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Tipo de build"
        type: choice
        options: [debug, release]
        default: debug
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Baseline mínima do workflow; o `contents: write` fica só no job que publica.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  # Mantidos em sincronia com android/build.gradle.
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK: "27.1.12297006"

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # `contents: write` é exigido pelo `gh release` (publicar o APK no "nightly").
    # Build e publicação ficam num job único de propósito: separar em dois jobs
    # exigiria upload/download do APK entre eles e duplicaria todo o setup
    # (Node + JDK + SDK) a cada run. Trade-off consciente: os passos de build
    # rodam com o mesmo token de write — mitigado pelas actions pinadas por SHA
    # e pelo checkout sem credenciais persistidas.
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          # `gh release` usa a API REST com GH_TOKEN — nenhum passo faz push via git.
          persist-credentials: false

      - name: 🔧 Definir parâmetros do build
        id: vars
        run: |
          set -euo pipefail
          # Tags e push na main geram release (empacota o JS no APK, instala e roda
          # no celular sem Metro). Disparo manual respeita a escolha (default debug,
          # útil pra rodar ligado no Metro em dev).
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BUILD_TYPE="release"
            VERSION="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
            VERSION="${BUILD_TYPE}-${GITHUB_SHA::7}"
          else
            BUILD_TYPE="release"
            VERSION="${BUILD_TYPE}-${GITHUB_SHA::7}"
          fi
          # versionName do app (barato: lido direto do build.gradle, sem Gradle).
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]+"([^"]+)".*/\1/p' android/app/build.gradle | head -n 1)
          echo "build_type=$BUILD_TYPE"                 >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${BUILD_TYPE^}"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                       >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}"             >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME:-n/d}"      >> "$GITHUB_OUTPUT"
          echo "::notice::Build $BUILD_TYPE (task assemble${BUILD_TYPE^}) — versão $VERSION (versionName ${VERSION_NAME:-n/d}, versionCode ${{ github.run_number }})"

      - name: ⚙️ Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Instalar dependências (npm ci)
        run: npm ci

      - name: ⚙️ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: ⚙️ Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: 📦 Instalar pacotes do SDK (plataforma ${{ env.ANDROID_PLATFORM }}, NDK ${{ env.ANDROID_NDK }})
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK}"

      - name: 🏗️ Build do APK (${{ steps.vars.outputs.gradle_task }})
        id: build
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          INICIO=$(date +%s)
          # versionCode = número da run (sempre incrementa) para o Android
          # reconhecer cada APK como update. versionName vem do build.gradle.
          # APK só arm64-v8a: cobre praticamente todo celular atual e corta ~4x o
          # tempo de compilação nativa (Nova Arquitetura compila C++ por ABI).
          # Para AAB de loja (todas as ABIs) usar `npm run build:android:aab`.
          ./gradlew ${{ steps.vars.outputs.gradle_task }} \
            -PfoteballVersionCode=${{ github.run_number }} \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon --stacktrace --warning-mode=all
          DURACAO=$(( $(date +%s) - INICIO ))
          echo "duracao=$(printf '%dm%02ds' $((DURACAO / 60)) $((DURACAO % 60)))" >> "$GITHUB_OUTPUT"

      - name: 🔍 Localizar e renomear o APK
        id: apk
        run: |
          set -euo pipefail
          SRC="$(find android/app/build/outputs/apk -name '*.apk' | head -n1)"
          if [ -z "$SRC" ]; then
            echo "::error::Nenhum APK encontrado em android/app/build/outputs/apk"
            exit 1
          fi
          DEST="foteball-${{ steps.vars.outputs.version }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST"                     >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$DEST" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: 📤 Publicar APK (artifact)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: foteball-apk-${{ steps.vars.outputs.build_type }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # Push na main: publica o APK num Release fixo "nightly" (tag estável), pra
      # baixar direto no celular sem login. Recria o release a cada push para
      # sempre ter só o APK mais novo.
      - name: 🚀 Publicar APK no Release "nightly" (só push na main)
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly "${{ steps.apk.outputs.path }}" \
            --title "FOTEBALL — build de teste (main)" \
            --notes "APK de teste do último commit da main (\`${{ steps.vars.outputs.short_sha }}\`). No celular, habilite 'instalar de fontes desconhecidas' e toque no .apk." \
            --prerelease \
            --target "${GITHUB_SHA}"

      # Avisa no Telegram com o LINK do APK (se os secrets estiverem configurados).
      # Config: crie um bot no @BotFather, dê /start nele, pegue seu chat id
      # (@userinfobot) e salve em Settings → Secrets → Actions:
      #   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
      - name: 📣 Avisar no Telegram com o link do APK (só push na main)
        if: github.event_name == 'push' && github.ref_name == 'main'
        continue-on-error: true # aviso é best-effort: nunca derruba o build
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ steps.vars.outputs.short_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN}" ] || [ -z "${TG_CHAT}" ]; then
            echo "::notice::Telegram não configurado (secrets TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID ausentes) — pulando."
            exit 0
          fi
          LINK="https://github.com/${REPO}/releases/tag/nightly"
          TEXTO="🟢 FOTEBALL — novo build (${SHA}). Baixe o APK: ${LINK}"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TG_CHAT}" \
            --data-urlencode text="${TEXTO}" >/dev/null \
            && echo "Link enviado ao Telegram."

      - name: 📋 Resumo do build
        if: success()
        run: |
          {
            echo "## 📱 APK FOTEBALL gerado"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Tipo | \`${{ steps.vars.outputs.build_type }}\` |"
            echo "| versionName | \`${{ steps.vars.outputs.version_name }}\` |"
            echo "| versionCode | \`${{ github.run_number }}\` |"
            echo "| Arquivo | \`${{ steps.apk.outputs.path }}\` |"
            echo "| Tamanho | ${{ steps.apk.outputs.size }} |"
            echo "| Tempo de build (gradle) | ${{ steps.build.outputs.duracao }} |"
            echo "| Commit | \`${{ steps.vars.outputs.short_sha }}\` |"
            echo ""
            echo "⬇️ Baixe em **Artifacts** (topo desta página): \`foteball-apk-${{ steps.vars.outputs.build_type }}\`."
            if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
              echo ""
              echo "📲 Ou baixe direto no celular pelo Release: **[nightly](https://github.com/${{ github.repository }}/releases/tag/nightly)**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Rastreabilidade de erro: em falha, sobe os relatórios do Gradle/AGP.
      - name: 🪵 Upload de logs/reports (em falha)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-reports
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
            android/build/reports/
          if-no-files-found: ignore
          retention-days: 7
